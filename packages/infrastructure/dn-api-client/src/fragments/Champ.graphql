fragment BasicChampFragment on Champ {
  __typename
  label
  stringValue
  ... on DateChamp {
    date
  }
  ... on DecimalNumberChamp {
    decimalNumber: value
  }
  ... on IntegerNumberChamp {
    integerNumber: value
  }
  ... on PieceJustificativeChamp {
    files {
      ...FileFragment
    }
  }
  ... on AddressChamp {
    address {
      ...AddressFragment
    }
  }
}

fragment ChampFragment on Champ {
  ...BasicChampFragment
  ... on RepetitionChamp {
    rows {
      champs {
        ...BasicChampFragment
      }
    }
  }
}
